<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Uniform Builder</title>

<!-- Load libraries via CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  margin:0;
  padding:30px;
}

.logo{
  text-align:center;
  margin-bottom:10px;
}

.logo img{
  max-width:220px;
}

h1{
  text-align:center;
  color:#FF5B1A;
  margin-top:5px;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:white;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
  overflow:hidden;
}

.card img{
  width:100%;
  height:260px;
  object-fit:contain;
}

.options{
  padding:10px;
  font-size:14px;
}

.summary{
  background:#333333;
  color:white;
  padding:20px;
  margin-top:20px;
  border-radius:8px;
  text-align:center;
}

.total{
  font-size:26px;
  color:#FF5B1A;
  font-weight:bold;
  margin-top:10px;
}

button{
  background:#FF5B1A;
  border:none;
  padding:12px 20px;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
  width:100%;
}

.client{
  margin-bottom:10px;
}

input, select{
  padding:5px;
  margin-top:4px;
}

/* Mobile responsiveness */
@media(max-width:600px){
  .products {
    grid-template-columns: 1fr;
  }
  .summary {
    padding:15px;
  }
}
</style>
</head>

<body>

<div class="logo">
  <img src="logo.png" alt="Custom Workwear Direct Logo">
</div>

<h1>Uniform Builder</h1>

<div class="summary">

<div class="client">
Client Name<br>
<input id="clientName">
</div>

<div class="client">
Company<br>
<input id="clientCompany">
</div>

<div class="client">
Email<br>
<input id="clientEmail">
</div>

Employees<br>
<input type="number" id="staff" value="1" min="1">

<div class="total">
£<span id="total">0</span>
</div>

Cost per employee £<span id="employee">0</span><br>
Monthly £<span id="month">0</span><br>
Daily £<span id="day">0</span>

<br>

<button onclick="downloadQuote()">Download Quote</button>
<button onclick="clearBuilder()">Clear Builder</button>

</div>

<div class="products" id="products"></div>

  <br>
  <div class="footer">
© 2026 Custom Workwear Direct. All rights reserved.
    Developed by Custom Workwear Direct.</div><script>
  
const products=[
{name:"Polo Shirt",price:7,image:"polo.jpg",branding:true},
{name:"T-Shirt",price:5,image:"tshirt.jpg",branding:true},
{name:"Hoodie",price:20,image:"hoodie.jpg",branding:true},
{name:"Sweatshirt",price:18,image:"sweatshirt.jpg",branding:true},
{name:"Body Warmer",price:30,image:"bodywarmer.jpg",branding:true},
{name:"Fleece Jacket",price:22,image:"fleecejacket.jpg",branding:true},
{name:"Soft Shell Jacket",price:30,image:"softshell.jpg",branding:true},
{name:"Hi Vis Vest",price:4,image:"hivisvest.jpg",branding:true},
{name:"Hi Vis Jacket",price:45,image:"hivisjacket.jpg",branding:true},
{name:"Work Trouser",price:25,image:"worktrouser.jpg",branding:true},
{name:"Safety Trainers",price:35,image:"trainers.jpg",footwear:true},
{name:"Safety Boots",price:79,image:"boots.jpg",footwear:true},
{name:"Safety Cap",price:15,image:"cap.jpg",branding:true},
{name:"Beanie",price:8,image:"beanie.jpg",branding:true}
];

const container=document.getElementById("products");

products.forEach(p=>{
  let html=`
  <div class="card" data-name="${p.name}" data-price="${p.price}">
    <img src="${p.image}" alt="${p.name}">
    <div class="options">
      <b>${p.name} £${p.price}</b><br>
      Qty <input type="number" class="qty" value="0" min="0">
  `;

  if(p.branding){
    if(p.name === "Safety Cap" || p.name === "Beanie"){
      html+=`
        <label><input type="checkbox" class="brand" data-price="5" checked> Front Embroidery £5</label>
        <label><input type="checkbox" class="brand" data-price="4"> Front Print £4</label>
      `;
    } else {
      html+=`
        <label><input type="checkbox" class="brand" data-price="5" checked> Left Chest Embroidery £5</label>
        <label><input type="checkbox" class="brand" data-price="4"> Left Chest Print £4</label>
        <details>
          <summary>More Branding</summary>
          <label><input type="checkbox" class="brand" data-price="5"> Right Chest</label>
          <label><input type="checkbox" class="brand" data-price="5"> Left Arm</label>
          <label><input type="checkbox" class="brand" data-price="5"> Right Arm</label>
          <label><input type="checkbox" class="brand" data-price="5"> Back Neck</label>
          <label><input type="checkbox" class="brand" data-price="8"> Large Print Front</label>
          <label><input type="checkbox" class="brand" data-price="8"> Large Print Back</label>
        </details>
      `;
    }
  }

  if(p.footwear){
    html+=`<br>Size <select>
      <option>5</option><option>6</option><option>7</option>
      <option>8</option><option>9</option><option>10</option>
      <option>11</option><option>12</option>
    </select>`;
  }

  html+=`</div></div>`;
  container.innerHTML+=html;
});

function calculate(){
  let staff=parseInt(document.getElementById("staff").value)||1;
  let total=0;
  document.querySelectorAll(".card").forEach(card=>{
    let price=parseFloat(card.dataset.price);
    let qty=parseInt(card.querySelector(".qty").value)||0;
    let item=qty*price*staff;
    card.querySelectorAll(".brand:checked").forEach(b=>{
      item+=qty*parseFloat(b.dataset.price)*staff;
    });
    total+=item;
  });
  document.getElementById("total").innerText=total.toFixed(2);
  let per=total/staff;
  document.getElementById("employee").innerText=per.toFixed(2);
  document.getElementById("month").innerText=(per/12).toFixed(2);
  document.getElementById("day").innerText=(per/365).toFixed(2);
}

document.addEventListener("input",calculate);
calculate();

function downloadQuote(){
  const { jsPDF } = window.jspdf;
  const doc=new jsPDF();

  let name=document.getElementById("clientName").value;
  let company=document.getElementById("clientCompany").value;
  let staff=document.getElementById("staff").value;

  let y=20;
  doc.setFontSize(18);
  doc.text("Custom Workwear Direct Quote",20,y);
  y+=10;

  doc.setFontSize(10);
  doc.text("Custom Workwear Direct",20,y);
  y+=5;
  doc.text("sales@customworkweardirect.co.uk",20,y);
  y+=5;
  doc.text("0203 375 6203",20,y);
  y+=5;
  doc.text("www.customworkweardirect.online",20,y);
  y+=10;

  doc.setFontSize(12);
  doc.text("Client: "+name,20,y);
  y+=6;
  doc.text("Company: "+company,20,y);
  y+=6;
  doc.text("Employees: "+staff,20,y);
  y+=10;

  document.querySelectorAll(".card").forEach(card=>{
    let qty=parseInt(card.querySelector(".qty").value)||0;
    if(qty>0){
      doc.text(card.dataset.name+" x "+qty,20,y);
      y+=6;
      card.querySelectorAll(".brand:checked").forEach(b=>{
        doc.text("- "+b.parentElement.innerText.trim(),25,y);
        y+=6;
      });
      y+=3;
    }
  });

  doc.text("Total £"+document.getElementById("total").innerText,20,y);
  y+=6;
  doc.text("Cost per employee £"+document.getElementById("employee").innerText,20,y);
  y+=6;
  doc.text("Monthly £"+document.getElementById("month").innerText,20,y);
  y+=6;
  doc.text("Daily £"+document.getElementById("day").innerText,20,y);

  doc.save("uniform-quote.pdf");
}

// Clear builder function
function clearBuilder(){
  document.querySelectorAll(".qty").forEach(q=>q.value=0);
  document.querySelectorAll(".brand").forEach(b=>{
    if(b.parentElement.innerText.includes("Left Chest") || b.parentElement.innerText.includes("Front")){
      b.checked=true;
    } else {
      b.checked=false;
    }
  });
  document.getElementById("staff").value=1;
  document.getElementById("clientName").value="";
  document.getElementById("clientCompany").value="";
  document.getElementById("clientEmail").value="";
  calculate();
}
</script>

  
</body>
</html>
